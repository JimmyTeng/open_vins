%YAML:1.0 # 文件顶部需声明 YAML 版本
---
# ---------- 状态估计 / 标定开关 ----------
use_fej: true # 是否使用一阶估计雅可比（FEJ），建议开启以利一致性
# 主滤波器 IMU 状态传播（Propagator 预测/克隆）：discrete | rk4 | analytical；rk4/analytical 用解析 F、G 与协方差相关量
# 不影响静态/动态初始化内部优化；亦非仓库内 CPI 连续预积分（CpiSequence）的开关
integration: "rk4"
use_stereo: false # 多相机时是否启用双目立体约束（单目式跟踪时每相机仍独立提特征）
max_cameras: 1 # 相机路数：1 单目，2 立体，>2 多目

calib_cam_extrinsics: true # 是否在线优化相机–IMU 外参（R_ItoC、p_CinI）
calib_cam_intrinsics: true # 是否在线优化内参（fx,fy,cx,cy 与畸变）
calib_cam_timeoffset: true # 是否在线优化 cam–IMU 时间偏移
calib_imu_intrinsics: false # 是否在线标定 IMU 内参（尺度/轴间耦合矩阵）
calib_imu_g_sensitivity: false # 是否在线标定陀螺重力灵敏度 Tg

max_clones: 30 # 滑动窗口克隆位姿个数；越大计算越重、越平滑滞后
max_slam: 50 # 状态中 SLAM 路标个数上限
max_slam_in_update: 25 # 单次更新一批 SLAM 特征数上限（可分批）
max_msckf_in_update: 25 # 单次 MSCKF 特征更新数上限（过大时一批离群特征易拉偏速度/位置，可酌减）
dt_slam_delay: 0 # 初始化后延迟多少秒再启用 SLAM 更新（初值不稳时增大）

# 与 Kalibr「目标系重力」模长一致，约 9.807 m/s²
gravity_mag: 9.82

# 传播后对速度 v 的误差协方差按轴增加方差 (m^2/s^2)；0=关闭。略增大可降低「只靠 IMU 积分」对速度的过信，便于视觉/SLAM 拉回速度、减轻位置发散（与 kalibr 加计噪声、up_msckf_chi2 等一起调）
post_propagate_vel_cov_diag_add: 0.02

# ---------- 特征参数化（勿随意改，需与前端/后端一致）----------
feat_rep_msckf: "GLOBAL_3D" # MSCKF 特征表示方式
feat_rep_slam: "ANCHORED_MSCKF_INVERSE_DEPTH" # SLAM 路标表示
feat_rep_aruco: "ANCHORED_MSCKF_INVERSE_DEPTH" # ArUco 表示

# ---------- 零速更新 ZUPT（初始化完成后静止段）----------
# 静止门恒为 gate_agree || gate_strict（赞同阈值支路 || 否决阈值支路），任一通过即可触发 ZUPT
try_zupt: true # 是否启用 ZUPT
zupt_only_at_beginning: false # true：仅初期静止阶段用 ZUPT；false：全程可触发
zupt_exit_consecutive_failures: 2 # 延迟退出：连续 n 回合判定“离开 ZUPT”才退出；1=立即退出（旧行为）
zupt_exit_cov_inflation: 1.0 # 确认退出 ZUPT 时对 IMU(15维)协方差整体倍化；1.0=关闭，>1 增大退出后不确定度
zupt_noise_multiplier: 1 # 测量噪声 R 标量倍率；χ² 门限与 EKF 的 R 共用；>1 更不信 ZUPT、抑制振动过信

# ---------- ZUPT：赞同阈值（OR）/ 否决阈值（AND）参考（结合分辨率与日志 [ZUPT] 调）----------
# 总门：merge=(gate_agree||gate_strict)；视差模式下赞同 = 小视差支路 || (χ²∧|v|∧未被大视差否决)
# · 赞同阈值 chi2：常用 1.0～1.5；否决阈值 chi2：常用 2～5（更严）；否决≥赞同。过大易误触发，过小难静止通过
# · |v|_max：真静止时赞同 0.05～0.2 m/s，否决 0.2～0.8 m/s；振动/漂移大时略放宽或先调 IMU/视觉
# · disp(px)：相邻帧平均视差；室内/近距约 0.5～3 px，走动常 >5～15 px；nf>20 且 disp≥agree_max 时会否决「仅靠 χ²+|v|」走赞同支路
# · 日志对照：[ZUPT] 行内 lim_agree/lim_strict、v_lim_agree/v_lim_strict、d_lim_agree/d_lim_strict

# 赞同阈值（对应代码 gate_agree；YAML zupt_agree_*；视差模式为 disp||(chi2∧|v|)）
zupt_agree_chi2_multipler: 1 # 赞同：χ² 门限倍率 chi2 ≤ mult×χ²_0.95；越大越易通过 IMU 门
zupt_agree_max_velocity: 0.1 # 赞同：|v| 上限（m/s）；超过则该支路速度判据不成立
zupt_agree_max_disparity: 1.5 # 赞同：平均视差阈值（px）；视差门开启且特征>20 时参与判据

# 否决阈值（对应代码 gate_strict；YAML zupt_strict_*；需 disp∧chi2∧|v| 同时满足，视差模式）
zupt_strict_chi2_multipler: 0.3 # 否决：χ² 门限倍率；通常 ≥ 赞同，使「严格静止」更难满足
zupt_strict_max_velocity: 0.4 # 否决：|v| 上限（m/s）
zupt_strict_max_disparity: 4 # 否决：视差阈值（px）

# ==================================================================
# ==================================================================

# ---------- 初始化 ----------
init_static_window_time: 0.9 # 静态初始化窗口时长（秒）
init_imu_thresh: 0.3 # 加速度计方差阈值，检测「急动」；0.0 关闭静态初始化分支（配合动态 init）
init_max_disparity: 1.0 # 判定静止的最大视差（与分辨率相关）
init_max_features: 20 # 初始化阶段跟踪特征数上限

init_dyn_window_time: 3 # 动态初始化窗口时长（秒）
init_dyn_mle_opt_calib: false # 动态 MLE 是否同时优化标定（一般关）
init_dyn_mle_max_iter: 50 # MLE 最大迭代；0 跳过 MLE
init_dyn_mle_max_time: 0.5 # MLE 时限（秒）；过小易超时
init_dyn_mle_max_threads: 2 # MLE 线程数
init_dyn_num_pose: 8 # 窗口内位姿个数（均匀采样）
init_dyn_min_deg: 5.0 # 初始化所需最小朝向变化（度）

init_dyn_inflation_ori: 10 # 动态初始化后 q_GtoI 协方差放大倍数
init_dyn_inflation_vel: 300 # 动态初始化后 v 协方差放大倍数
init_dyn_inflation_bg: 10 # 动态初始化后陀螺偏置协方差放大倍数
init_dyn_inflation_ba: 200 # 动态初始化后加计偏置协方差放大倍数
init_dyn_min_rec_cond: 1e-12 # 信息矩阵求逆最小允许倒数条件数；过小可能拒绝病态解

# 动态初始化三角化：首观测相机系下特征距光心深度（范数，m）；仅 [min,max] 内计入有效特征
init_dyn_triang_depth_min_m: 0.2
init_dyn_triang_depth_max_m: 1.5

# 动态初始化：最小有效特征数（测量充足与深度合格两处门槛）；须 ≤ init_max_features
init_dyn_min_valid_features: 8

# 动态初始化 bias 初值（PDF 未给 bias 时作起点；可与在线估计对齐）
init_dyn_bias_g: [-0.0011146074690264833, -0.011300524581876343, 0.008723352067730063]
init_dyn_bias_a: [-0.053302996178729294, -0.015902613210897493, 0.07961711223434825]

# ==================================================================
# ==================================================================

# ---------- 前端跟踪 ----------
use_klt: true # true：KLT；false：ORB 描述子 + 匹配
num_pts: 120 # 每相机每帧目标特征数（影响算力与鲁棒性）
fast_threshold: 25 # FAST 角点阈值；越小点越多、越慢
grid_x: 8 # 特征网格列数（均匀撒点）
grid_y: 6 # 特征网格行数
min_px_dist: 15 # 特征间最小像素距（过小则冗余）
knn_ratio: 0.5 # 描述子匹配 KNN 比值（仅非 KLT 时）
track_frequency: 15.0 # 期望跟踪帧率（Hz）；更高频率的帧会被丢弃
use_imu_klt_prior: true # 启用 IMU 先验评估（当前仅计算预测vs原始残差，不替换跟踪初值）
imu_klt_prior_min_dt: 0.002 # 使用 IMU 先验的最小帧间隔（秒）
imu_klt_prior_max_dt: 0.08 # 使用 IMU 先验的最大帧间隔（秒）

downsample_cameras: false # true：图像长宽各减半（内参在加载逻辑中已配合缩放）
num_opencv_threads: 1 # OpenCV 线程：-1 默认，0–1 串行，>1 多线程
histogram_method: "CLAHE" # 直方图均衡：NONE / HISTOGRAM / CLAHE

# ArUco（字典见 https://chev.me/arucogen/）
use_aruco: false # 是否检测 ArUco 标记
num_aruco: 1024 # 字典中 ID 上限相关
downsize_aruco: true # 是否将 ArUco 图像减半以加速

# ==================================================================
# ==================================================================

# ---------- 更新器噪声与 χ²（像素标准差、chi² 乘子）----------
up_msckf_sigma_px: 1 # MSCKF 像素观测噪声 σ（px）；略增可减轻过信视觉几何
up_msckf_chi2_multipler: 0.9 # MSCKF χ² 倍率；略小于 1 更易剔除离群、减轻错误速度修正
up_slam_sigma_px: 1 # SLAM 像素 σ（px）
up_slam_chi2_multipler: 1 # SLAM χ² 倍率
up_aruco_sigma_px: 1 # ArUco 像素 σ（px）
up_aruco_chi2_multipler: 1 # ArUco χ² 倍率

# 图像掩膜
use_mask: false # true 时需在配置目录提供 mask0.png 等（与分辨率一致）

# 外参/IMU 噪声链（相对主 YAML 的相对路径）
relative_config_imu: "kalibr_imu_chain.yaml" # IMU 噪声密度、随机游走、内参矩阵等
relative_config_imucam: "kalibr_imucam_chain.yaml" # 相机内参、畸变、T_imu_cam、timeshift

# 仿真
sim_traj_path: "" # 仿真轨迹文件；实机/离线留空

# ==================================================================
# ---------- 调试 / 日志 / 可视化 / 评测落盘 ----------
# ==================================================================
verbosity: "INFO" # 日志级别：ALL, DEBUG, INFO, WARNING, ERROR, SILENT
print_state_calib: true # 每次更新后是否打印状态与标定
print_timing: false # 是否打印各阶段耗时
print_tracking_stats: true # 是否打印 [VM] 帧与 [跟踪] 周期日志
print_zupt: true # 为 true 时打印 [ZUPT] 静止门/更新日志及启动时 ZUPT 参数说明
# true：每帧 retriangulate 后打印线性三角化 p_FinG（全局系 m；活动 MSCKF + SLAM）；输出量大，仅调试
print_triangulated_points: false

debug_display_waitkey_ms: 0 # 调试窗口 waitKey 时长（毫秒）；0=不等待，仅处理GUI事件
imu_klt_prior_debug: false # 打印 IMU 预测与原始值残差日志
print_klt_geom: false # true：打印 [KLT-GEOM] H/F RANSAC 与包络收缩统计（输出量大）

record_timing_information: true # 是否在结束时写计时统计
record_timing_filepath: "/tmp/traj_timing.txt" # 计时输出路径

# VIO 原始数据落盘（imu.csv、camera_index.csv、mosaics）；见 ov_core VioDataRecorder
record_vio_dataset: false # 是否记录数据集
record_vio_dataset_record_only: false # 仅记录不写 SLAM（须与上项同时为 true）
record_vio_dataset_root: "/tmp/vio_dataset_log" # 记录根目录（须可写绝对路径）
record_vio_mosaic_cols: 1 # 拼图列数
record_vio_mosaic_rows: 15 # 拼图行数（每包行数）

# 仿真/评测（ROS 等可能用；纯离线可忽略）
save_total_state: false # 是否保存状态与对角标准差到文件；配合 ov_eval 等
filepath_est: "/tmp/ov_estimate.txt" # 估计轨迹输出路径
filepath_std: "/tmp/ov_estimate_std.txt" # 标准差输出路径
filepath_gt: "/tmp/ov_groundtruth.txt" # 真值输出路径（仿真）
