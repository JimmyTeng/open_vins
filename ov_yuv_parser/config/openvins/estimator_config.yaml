%YAML:1.0 # need to specify the file type at the top!
---
use_fej: true # if first-estimate Jacobians should be used (enable for good consistency)
integration: "rk4" # discrete, rk4, analytical (if rk4 or analytical used then analytical covariance propagation is used)
use_stereo: false # if we have more than 1 camera, if we should try to track stereo constraints between pairs
max_cameras: 1 # how many cameras we have 1 = mono, 2 = stereo, >2 = binocular (all mono tracking)

calib_cam_extrinsics: true # if the transform between camera and IMU should be optimized R_ItoC, p_CinI
calib_cam_intrinsics: false # if camera intrinsics should be optimized (focal, center, distortion)
calib_cam_timeoffset: true # if timeoffset between camera and IMU should be optimized
calib_imu_intrinsics: false # if imu intrinsics should be calibrated (rotation and skew-scale matrix)
calib_imu_g_sensitivity: false # if gyroscope gravity sensitivity (Tg) should be calibrated

max_clones: 10 # how many clones in the sliding window
max_slam: 50 # number of features in our state vector
max_slam_in_update: 25 # update can be split into sequential updates of batches, how many in a batch
max_msckf_in_update: 40 # how many MSCKF features to use in the update
dt_slam_delay: 3 # delay before initializing (helps with stability from bad initialization...)

gravity_mag: 9.81 # magnitude of gravity in this location

feat_rep_msckf: "GLOBAL_3D"
feat_rep_slam: "ANCHORED_MSCKF_INVERSE_DEPTH"
feat_rep_aruco: "ANCHORED_MSCKF_INVERSE_DEPTH"

# zero velocity update parameters we can use
# we support either IMU-based or disparity detection.
try_zupt: true # if true, try to use ZUPT to initialize the system
zupt_chi2_multipler: 1 # set to 0 for only disp-based
zupt_max_velocity: 0.2 # maximum velocity to consider the platform stationary
zupt_noise_multiplier: 0.01 # noise multiplier for the ZUPT
zupt_max_disparity: 0.3 # set to 0 for only imu-based
zupt_only_at_beginning: false

# ==================================================================
# ==================================================================

init_window_time: 3 # how many seconds to collect initialization information (increased for better gravity estimation)
init_imu_thresh: 0.0 # threshold for variance of the accelerometer to detect a "jerk" in motion (set to 0.0 to disable static initialization)
init_max_disparity: 12.0 # max disparity to consider the platform stationary (dependent on resolution)
init_max_features: 25 # how many features to track during initialization (saves on computation)

init_dyn_use: true # if dynamic initialization should be used
init_dyn_mle_opt_calib: false # if we should optimize calibration during intialization (not recommended)
init_dyn_mle_max_iter: 50 # how many iterations the MLE refinement should use (zero to skip the MLE)
init_dyn_mle_max_time: 0.5 # how many seconds the MLE should be completed in (0.05 易在 12 姿态+多特征时超时)
init_dyn_mle_max_threads: 2 # how many threads the MLE should use
init_dyn_num_pose: 12 # number of poses to use within our window time (evenly spaced) - reduced from 6 to lower pose_dt_avg threshold
init_dyn_min_deg: 5.0 # orientation change needed to try to init

init_dyn_inflation_ori: 10 # what to inflate the recovered q_GtoI covariance by
init_dyn_inflation_vel: 100 # what to inflate the recovered v_IinG covariance by
init_dyn_inflation_bg: 10 # what to inflate the recovered bias_g covariance by
init_dyn_inflation_ba: 100 # what to inflate the recovered bias_a covariance by
init_dyn_min_rec_cond: 1e-12 # reciprocal condition number thresh for info inversion

# Initial bias from vio_calib_param.ini (gyroBias, accelBias)
init_dyn_bias_g: [-0.0011146074690264833, -0.011300524581876343, 0.008723352067730063]
init_dyn_bias_a: [-0.053302996178729294, -0.015902613210897493, 0.07961711223434825]

# ==================================================================
# ==================================================================

# if we want to save the simulation state and its diagional covariance
# use this with rosrun ov_eval error_simulation
save_total_state: false
filepath_est: "/tmp/ov_estimate.txt"
filepath_std: "/tmp/ov_estimate_std.txt"
filepath_gt: "/tmp/ov_groundtruth.txt"

# ==================================================================
# ==================================================================

# our front-end feature tracking parameters
# we have a KLT and descriptor based (KLT is better implemented...)
use_klt: true # if true we will use KLT, otherwise use a ORB descriptor + robust matching
num_pts: 80 # number of points (per camera) we will extract and try to track
fast_threshold: 25 # threshold for fast extraction (warning: lower threshs can be expensive)
grid_x: 8 # extraction sub-grid count for horizontal direction (uniform tracking)
grid_y: 6 # extraction sub-grid count for vertical direction (uniform tracking)
min_px_dist: 10 # distance between features (features near each other provide less information)
knn_ratio: 0.5 # descriptor knn threshold for the top two descriptor matches
track_frequency: 15.0 # frequency we will perform feature tracking at (in frames per second / hertz)

downsample_cameras: false # will downsample image in half if true
num_opencv_threads: 1 # -1: auto, 0-1: serial, >1: number of threads
histogram_method: "CLAHE" # NONE, HISTOGRAM, CLAHE

# aruco tag tracker for the system
# DICT_6X6_1000 from https://chev.me/arucogen/
use_aruco: false
num_aruco: 1024
downsize_aruco: true

# ==================================================================
# ==================================================================

# camera noises and chi-squared threshold multipliers
up_msckf_sigma_px: 1
up_msckf_chi2_multipler: 1
up_slam_sigma_px: 1
up_slam_chi2_multipler: 1
up_aruco_sigma_px: 1
up_aruco_chi2_multipler: 1

# masks for our images
use_mask: false

# imu and camera spacial-temporal
# imu config should also have the correct noise values
relative_config_imu: "kalibr_imu_chain.yaml"
relative_config_imucam: "kalibr_imucam_chain.yaml"

# 实机/离线运行可不加载仿真轨迹，留空即可；仿真时填写轨迹文件路径
sim_traj_path: ""

# ==================================================================
# 打印 / 日志 / 计时 参数（放最后便于调整）
# ==================================================================
verbosity: "INFO" # ALL, DEBUG, INFO, WARNING, ERROR, SILENT
record_timing_information: true # 数据集结束后输出帧率分析
record_timing_filepath: "/tmp/traj_timing.txt" # https://docs.openvins.com/eval-timing.html#eval-ov-timing-flame

# VIO 原始数据落盘（imu.csv + camera_index.csv + mosaics/*.png），见 ov_core VioDataRecorder
record_vio_dataset: true
# 仅写数据集，不跑 SLAM/跟踪/传播（须与 record_vio_dataset 同时为 true）
record_vio_dataset_record_only: true
# 记录根目录（须绝对路径）；每次运行在其下新建子目录 yyyymmddhhmmss（冲突则秒+1）
record_vio_dataset_root: "/mnt/data"
record_vio_mosaic_cols: 1
record_vio_mosaic_rows: 15
print_state_calib: true # 每次更新后打印状态与标定 (debug)
print_timing: true # 各阶段耗时 (track, prop, msckf, slam, marg)
print_tracking_stats: true # [VM] 帧与 [跟踪] 更新日志 (初始化阶段或每 200)
